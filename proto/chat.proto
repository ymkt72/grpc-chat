syntax = "proto3";
package grpcchat;

option go_package = "./gen";

import "google/protobuf/timestamp.proto";

// クライアントからメッセージを受け取り、サーバーからメッセージを返す
service ChatService {
    // クライアントからメッセージを受け取りメッセージを返すrpc
  rpc Chat(ClientMessage) returns (ServerMessage);
}

message ClientMessage {
    string username = 1;
    string text = 2;
}

message ServerMessage {
    string from = 1;
    string text = 2;
    google.protobuf.Timestamp timestamp = 3;
}